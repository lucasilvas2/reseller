version: "3.9"
services:
    mysql:
        image: mysql:8.0
        environment:
            MYSQL_ROOT_PASSWORD: rootpassword
            MYSQL_DATABASE: dealer
            MYSQL_USER: admin
            MYSQL_PASSWORD: admin
        ports:
            - "3326:3306"
        volumes:
            - mysql-data:/var/lib/mysql:rw
volumes:
    mysql-data:
